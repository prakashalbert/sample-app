steps:
# Step 1: Build Docker image for PROD
- name: gcr.io/cloud-builders/docker
  args:
    [
      "build",
      "-t",
      "us-central1-docker.pkg.dev/qwiklabs-gcp-02-2b724eb1a61d/my-repository/hello-cloudbuild:v1.0",
      "."
    ]

# Step 2: Push Docker image to Artifact Registry
- name: gcr.io/cloud-builders/docker
  args:
    [
      "push",
      "us-central1-docker.pkg.dev/qwiklabs-gcp-02-2b724eb1a61d/my-repository/hello-cloudbuild:v1.0"
    ]

# Step 3: Deploy to PROD namespace
- name: gcr.io/cloud-builders/kubectl
  args: ["-n", "prod", "apply", "-f", "prod/deployment.yaml"]
  env:
  - CLOUDSDK_COMPUTE_ZONE=us-central1-f
  - CLOUDSDK_CONTAINER_CLUSTER=hello-cluster

options:
  logging: CLOUD_LOGGING_ONLY
